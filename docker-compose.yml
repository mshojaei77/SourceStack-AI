services:
  searxng:
    image: searxng/searxng:latest
    container_name: research-assistant-searxng
    ports:
      - "8080:8080"
    environment:
      - BASE_URL=http://localhost:8080/
      - INSTANCE_NAME=Research Assistant
    volumes:
      - ./config/searxng:/etc/searxng:rw
    restart: unless-stopped

  qdrant:
    image: qdrant/qdrant:latest
    container_name: research-assistant-qdrant
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_storage:/qdrant/storage
    restart: unless-stopped

volumes:
  qdrant_storage:
