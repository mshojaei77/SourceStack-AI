services:
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: sourcestack-backend
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      - SEARXNG_URL=http://searxng:8080
      - QDRANT_URL=http://qdrant:6333
      - WORKBASES_DIR=/app/data/workspaces
    volumes:
      - ./:/app
    depends_on:
      - qdrant
      - searxng
    restart: unless-stopped

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    container_name: sourcestack-frontend
    ports:
      - "5173:5173"
    environment:
      - VITE_API_PROXY_TARGET=http://backend:8000
    volumes:
      - ./frontend:/app
      - /app/node_modules
    depends_on:
      - backend
    restart: unless-stopped

  searxng:
    image: searxng/searxng:latest
    container_name: sourcestack-searxng
    ports:
      - "8080:8080"
    environment:
      - BASE_URL=http://localhost:8080/
      - INSTANCE_NAME=SourceStack AI
    volumes:
      - ./config/searxng:/etc/searxng:rw
    restart: unless-stopped

  qdrant:
    image: qdrant/qdrant:latest
    container_name: sourcestack-qdrant
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_storage:/qdrant/storage
    restart: unless-stopped

volumes:
  qdrant_storage:
